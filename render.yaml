services:
  - type: web
    name: shl-recommender-api
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: CATALOG_PATH
        value: data/shl_product_catalog.json
      - key: CHROMA_PATH
        value: data/chroma
      - key: EMBEDDING_MODEL
        value: BAAI/bge-large-en-v1.5
      - key: EMBEDDING_FALLBACK_MODEL
        value: BAAI/bge-base-en-v1.5
      - key: USE_RERANKER
        value: "true"
      - key: CORS_ORIGINS
        value: https://your-app.netlify.app,http://localhost:5173
