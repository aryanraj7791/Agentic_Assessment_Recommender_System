services:
  - type: web
    name: shl-recommender-api
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: CATALOG_PATH
        value: data/shl_product_catalog.json
      - key: RETRIEVAL_MODE
        value: keyword
      - key: USE_RERANKER
        value: "false"
      - key: LAZY_INIT
        value: "true"
      - key: CORS_ORIGINS
        value: https://your-app.netlify.app,http://localhost:5173
      - key: MAX_RECOMMENDATIONS
        value: "10"
      - key: LOG_LEVEL
        value: INFO
